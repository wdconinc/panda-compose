name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup PanDA stack
        uses: ./
        with:
          ref: ${{ github.sha }}
          timeout: '300'

      - name: Verify Harvester is running
        run: |
          docker compose -f $PANDA_COMPOSE_DIR/docker-compose.yml \
            -p $PANDA_COMPOSE_PROJECT ps harvester
          docker compose -f $PANDA_COMPOSE_DIR/docker-compose.yml \
            -p $PANDA_COMPOSE_PROJECT logs harvester --tail=20

      - name: Wait for Harvester healthy
        run: |
          echo "Waiting for Harvester to become healthy (timeout 300s)..."
          DEADLINE=$((SECONDS + 300))
          STATUS="unknown"
          while [[ $SECONDS -lt $DEADLINE ]]; do
            STATUS=$(docker inspect \
              --format='{{.State.Health.Status}}' \
              ${PANDA_COMPOSE_PROJECT}-harvester-1 2>/dev/null || echo "not_found")
            echo "  Harvester health: $STATUS"
            [[ "$STATUS" == "healthy" ]] && break
            sleep 10
          done
          if [[ "$STATUS" != "healthy" ]]; then
            docker compose -f $PANDA_COMPOSE_DIR/docker-compose.yml \
              -p $PANDA_COMPOSE_PROJECT logs harvester --tail=50
            echo "ERROR: Harvester did not become healthy within 300s (status: $STATUS)"
            exit 1
          fi
          echo "Harvester is healthy."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install panda-client
        run: python -m pip install panda-client

      - name: Integration test — submit, poll, query status
        run: |
          echo "=== Submitting job ==="
          # Use --container to specify a per-job container image, mirroring PanDA's
          # production container_name field. The DockerSubmitter reads this from
          # job.jobParams["container_name"] and prefers it over the queue-level default.
          # python:3.12-alpine is deliberately different from the queue default (alpine:latest)
          # to prove per-job container selection is working.
          JOB_ID=$(python3 $PANDA_COMPOSE_DIR/scripts/pandajob-submit \
            --site PANDA_COMPOSE_LOCAL \
            --container python:3.12-alpine \
            --transformation sh \
            --params "-c 'echo hello from python:3.12-alpine; python3 --version; uname -a'" \
            --name ci-integration-test)
          echo "Submitted PanDA job ID: $JOB_ID"

          if ! [[ "$JOB_ID" =~ ^[0-9]+$ ]]; then
            echo "ERROR: expected integer job ID, got: $JOB_ID"
            exit 1
          fi

          echo "=== Waiting for job to reach finished/failed (timeout 10 min) ==="
          DEADLINE=$((SECONDS + 600))
          POLL=0
          while [[ $SECONDS -lt $DEADLINE ]]; do
            STATUS_JSON=$(python3 $PANDA_COMPOSE_DIR/scripts/pandajob-status "$JOB_ID")
            JOB_STATUS=$(echo "$STATUS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['jobStatus'])")
            echo "[$(date -u '+%H:%M:%S')] Job status: $JOB_STATUS"
            case "$JOB_STATUS" in
              finished)
                echo "OK: job reached 'finished'"
                break
                ;;
              failed|cancelled)
                echo "ERROR: job ended in terminal state '$JOB_STATUS'"
                echo "$STATUS_JSON"
                # Fall through to diagnostics before exiting
                POLL=3
                ;;
            esac

            # Dump diagnostics every 4 polls (~60 s) so stuck jobs are visible.
            POLL=$(( (POLL + 1) % 4 ))
            if [[ "$POLL" -eq 0 ]]; then
              echo "--- [diag] worker containers ---"
              docker ps -a --filter 'name=harvester-worker' \
                --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' 2>/dev/null || true
              echo "--- [diag] harvester job_fetcher log ---"
              docker exec ${PANDA_COMPOSE_PROJECT}-harvester-1 \
                tail -n 15 /var/log/harvester/panda-job_fetcher.log 2>/dev/null || true
              echo "--- [diag] harvester submitter log ---"
              docker exec ${PANDA_COMPOSE_PROJECT}-harvester-1 \
                tail -n 15 /var/log/harvester/panda-submitter.log 2>/dev/null || true
              echo "--- [diag] harvester docker_submitter log ---"
              docker exec ${PANDA_COMPOSE_PROJECT}-harvester-1 \
                tail -n 15 /var/log/harvester/panda-docker_submitter.log 2>/dev/null || true
              echo "--- [diag] harvester work_table ---"
              docker exec ${PANDA_COMPOSE_PROJECT}-mariadb-1 \
                mysql -uharvester -pharvester_secret harvester_db \
                -e "SELECT workerID, status, nativeStatus, LEFT(batchID,12) AS batchID FROM work_table ORDER BY workerID DESC LIMIT 10;" \
                2>/dev/null || true
              echo "---"
            fi

            [[ "$JOB_STATUS" == "failed" || "$JOB_STATUS" == "cancelled" ]] && exit 1
            sleep 15
          done

          echo "--- [diag] final harvester submitter log ---"
          docker exec ${PANDA_COMPOSE_PROJECT}-harvester-1 \
            tail -n 30 /var/log/harvester/panda-submitter.log 2>/dev/null || true
          echo "--- [diag] final docker_submitter log ---"
          docker exec ${PANDA_COMPOSE_PROJECT}-harvester-1 \
            tail -n 30 /var/log/harvester/panda-docker_submitter.log 2>/dev/null || true
          echo "--- [diag] final docker_monitor log ---"
          docker exec ${PANDA_COMPOSE_PROJECT}-harvester-1 \
            tail -n 30 /var/log/harvester/panda-docker_monitor.log 2>/dev/null || true
          echo "--- [diag] final worker containers ---"
          docker ps -a --filter 'name=harvester-worker' \
            --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' 2>/dev/null || true

          if [[ "$JOB_STATUS" != "finished" ]]; then
            echo "ERROR: job did not reach 'finished' within 10 minutes (last status: $JOB_STATUS)"
            exit 1
          fi

      - name: Tear down PanDA stack
        if: always()
        run: |
          docker compose -f $PANDA_COMPOSE_DIR/docker-compose.yml \
            -p $PANDA_COMPOSE_PROJECT down -v
