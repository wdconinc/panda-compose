name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Copy default environment
        run: cp .env.example .env

      - name: Start PanDA stack
        run: docker compose up -d

      - name: Wait for PanDA server to become healthy
        run: ./scripts/healthcheck.sh 300

      - name: Wait for JEDI to become healthy
        run: |
          echo "Waiting for JEDI to become healthy (timeout 120s)..."
          DEADLINE=$((SECONDS + 120))
          STATUS="unknown"
          while [[ $SECONDS -lt $DEADLINE ]]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' panda-compose-panda-jedi-1 2>/dev/null || echo "not_found")
            echo "  JEDI health: $STATUS"
            [[ "$STATUS" == "healthy" ]] && break
            sleep 10
          done
          if [[ "$STATUS" != "healthy" ]]; then
            docker compose logs panda-jedi --tail=50
            echo "ERROR: JEDI did not become healthy within 2 minutes (status: $STATUS)"
            exit 1
          fi
          echo "JEDI is healthy."

      - name: Verify Harvester is running
        run: |
          docker compose ps harvester
          docker compose logs harvester --tail=20

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install panda-client
        run: |
          python -m pip install panda-client

      - name: Integration test — submit, status, kill
        env:
          PANDA_URL: http://localhost:25080/server/panda
          PANDA_URL_SSL: http://localhost:25080/server/panda
          X509_USER_PROXY: /dev/null
        run: |
          echo '#!/bin/bash' > /tmp/panda_ci_test.sh
          echo 'echo "CI integration test job"' >> /tmp/panda_ci_test.sh
          chmod +x /tmp/panda_ci_test.sh

          echo "=== Submitting job ==="
          JOB_ID=$(python3 scripts/pandajob-submit \
            --site PANDA_COMPOSE_LOCAL \
            --script /tmp/panda_ci_test.sh \
            --name ci-integration-test)
          echo "Submitted PanDA job ID: $JOB_ID"

          if ! [[ "$JOB_ID" =~ ^[0-9]+$ ]]; then
            echo "ERROR: expected integer job ID, got: $JOB_ID"
            exit 1
          fi

          echo "=== Waiting for job to reach finished/failed (timeout 5 min) ==="
          DEADLINE=$((SECONDS + 300))
          while [[ $SECONDS -lt $DEADLINE ]]; do
            STATUS_JSON=$(python3 scripts/pandajob-status "$JOB_ID")
            JOB_STATUS=$(echo "$STATUS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['jobStatus'])")
            echo "[$(date -u '+%H:%M:%S')] Job status: $JOB_STATUS"
            case "$JOB_STATUS" in
              finished)
                echo "OK: job reached 'finished'"
                break
                ;;
              failed|cancelled)
                echo "ERROR: job ended in terminal state '$JOB_STATUS'"
                echo "$STATUS_JSON"
                exit 1
                ;;
            esac
            sleep 15
          done

          if [[ "$JOB_STATUS" != "finished" ]]; then
            echo "ERROR: job did not reach 'finished' within 5 minutes (last status: $JOB_STATUS)"
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
