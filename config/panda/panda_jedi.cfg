# panda_jedi.cfg — PanDA JEDI configuration for docker-compose dev stack
# Adapted from panda-server/templates/panda_jedi.cfg.rpmnew.template
# Configured for the generic WLCG VO (no ATLAS-specific plugins).

[master]
uname = atlpan
gname = zp
loggername = jedi

[db]
dbhost    = postgres
dbuser    = panda
dbpasswd  = panda_secret
dbname    = panda_db

nWorkers      = 2

schemaJEDI    = DOMA_PANDA
schemaDEFT    = DOMA_DEFT
schemaPANDA   = DOMA_PANDA
schemaPANDAARCH = DOMA_PANDAARCH
schemaMETA    = DOMA_PANDAMETA

[ddm]
modConfig             = wlcg:1:pandajedi.jediddm.GenDDMClient:GenDDMClient
voWithScope           = atlas
user_scope_in_lowercase = True

[confeeder]
procConfig  = wlcg:any:1
nWorkers    = 2
loopCycle   = 10
checkInterval = 5

[taskrefine]
modConfig  = wlcg:any:pandajedi.jedirefine.GenTaskRefiner:GenTaskRefiner
procConfig = ::1
nWorkers   = 1
loopCycle  = 10

[jobbroker]
modConfig = wlcg:any:pandajedi.jedibrokerage.GenJobBroker:GenJobBroker

[jobthrottle]
modConfig = wlcg:any:pandajedi.jedithrottle.GenJobThrottler:GenJobThrottler

[jobgen]
procConfig   = wlcg:any:2:
nTasks       = 50
nFiles       = 5000
nWorkers     = 2
loopCycle    = 10
lockInterval = 5

[postprocessor]
modConfig  = wlcg:any:pandajedi.jedipprocess.GenPostProcessor:GenPostProcessor
procConfig = ::1
nWorkers   = 2
nTasks     = 50
loopCycle  = 20

[watchdog]
modConfig          = wlcg:any:pandajedi.jedidog.GenWatchDog:GenWatchDog
procConfig         = wlcg:any:1
loopCycle          = 300
waitForPicked      = 30
waitForPending     = 60
timeoutForPending  = 7
waitForLocked      = 60
waitForThrottled   = 120
waitForExhausted   = 48
waitForAchieved    = 60

[taskbroker]
modConfig  = wlcg:managed:pandajedi.jedibrokerage.GenJobBroker:GenJobBroker
procConfig = wlcg:managed:1
nWorkers   = 1
loopCycle  = 600

[tcommando]
procConfig = ::1
nWorkers   = 2
loopCycle  = 60

[tasksetup]
modConfig = wlcg:any:pandajedi.jedisetup.GenTaskSetupper:GenTaskSetupper

[msgprocessor]
# configFile = /etc/panda/jedi_msg_proc_config.json

[mq]
# configFile = /etc/panda/jedi_mq_config.json
