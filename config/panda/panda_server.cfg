# panda_server.cfg — PanDA server configuration for docker-compose dev stack
# Adapted from panda-server/templates/panda_server.cfg.rpmnew.template
# Environment variables (PANDA_DB_*) are substituted by the container entrypoint.

[server]

##########################
# Logger parameters
##########################

logdir = /var/log/panda
loggername = prod

##########################
# DA parameters
##########################

cache_dir = /var/log/panda/pandacache

##########################
# DDM parameters
##########################

native_python = /opt/panda/bin
native_python32 = /opt/panda/bin

pandaCommon_dir = /opt/panda/lib/python3/site-packages/pandacommon
pandaPython_dir = /opt/panda/lib/python3/site-packages/pandaserver

home_dir_cwd = /home/atlpan

##########################
# Database parameters
##########################

# Populated via PANDA_DB_* environment variables by the container entrypoint.
# Values here serve as fallback defaults for direct config-file usage.
dbhost     = postgres
dbport     = 5432
dbuser     = panda
dbpasswd   = panda_secret
dbname     = panda_db

# backend
backend = postgres

nDBConnection  = 1
usedbtimeout   = True
dbtimeout      = 300
dbbridgeverbose = False
dump_sql       = False
cursor_dump    = False

# Schema names
schemaPANDA    = DOMA_PANDA
schemaMETA     = DOMA_PANDAMETA
schemaPANDAARCH = DOMA_PANDAARCH
schemaJEDI     = DOMA_PANDA
schemaDEFT     = DOMA_DEFT

##########################
# PanDA server parameters
##########################

pserverport      = 443
pserverporthttp  = 80
pserverportcache = 85
pserveralias     = panda-server

keyDir = /var/keys

##########################
# WSGI
##########################

entryVerbose = False

##########################
# nRunning parameters
##########################

nrun_interval = 5
nrun_hosts    = 1
nrun_snum     = 999

##########################
# Job Status Monitor
##########################

record_statuschange = True

##########################
# JEDI
##########################

useJEDI = True

##########################
# Plugin setup
##########################

adder_plugins    = any:pandaserver.dataservice.adder_dummy_plugin:AdderDummyPlugin
setupper_plugins = any:pandaserver.dataservice.adder_dummy_plugin:AdderDummyPlugin

##########################
# Token-based authentication
# Set token_authType = oidc to enable OIDC; leave as None for dev/no-auth mode.
##########################

token_authType = None

# Dev/CI: grant production role to the fake DN injected by Apache's SetEnv directive.
# This allows Harvester (and other internal services) to call privileged endpoints.
production_dns = /CN=panda-dev-user
pilot_owners   = /CN=panda-dev-user

##########################
# Message Queue
##########################

# Uncomment and point at the activemq service when MQ is needed.
# mq_configFile = /etc/panda/panda_mq_config.json


[daemon]

##########################
# Daemon configuration
##########################

enable    = True
uname     = atlpan
gname     = zp
package   = pandaserver.daemons.scripts
n_proc    = 2
n_dbconn  = 1
proc_lifetime = 14400

config = {
    "add_main": {
        "enable": true, "period": 240, "loop": true},
    "add_sub": {
        "enable": true, "period": 240},
    "copyArchive": {
        "enable": true, "period": 2400, "sync": true},
    "datasetManager": {
        "enable": true, "period": 2400, "sync": true},
    "configurator": {
        "enable": true, "module": "configurator", "period": 200, "sync": true},
    "schedconfig_json": {
        "enable": true, "module": "configurator", "arguments": ["--json_dump"], "period": 200, "sync": true},
    "cache_schedconfig": {
        "enable": true, "period": 300},
    "cache_pilots": {
        "enable": true, "period": 3600}
  }
