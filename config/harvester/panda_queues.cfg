{
  "panda-compose-local.template": {
    "isTemplateQueue": true,
    "prodSourceLabel": "test",
    "nQueueLimitWorker": 100,
    "nQueueLimitJobRatio": 10,
    "nQueueLimitJobMax": 50,
    "nQueueLimitJobMin": 1,
    "maxWorkers": 10,
    "maxNewWorkersPerCycle": 10,
    "mapType": "OneToOne",
    "truePilot": false,
    "maxSubmissionAttempts": 3,
    "walltimeLimit": 3600,
    "prefetchEvents": false,
    "preparator": {
      "name": "DummyPreparator",
      "module": "pandaharvester.harvesterpreparator.dummy_preparator"
    },
    "submitter": {
      "name": "DockerSubmitter",
      "module": "docker_submitter",
      "containerImage": "alpine:latest",
      "dockerSocket": "unix:///var/run/docker.sock"
    },
    "workerMaker": {
      "name": "SimpleWorkerMaker",
      "module": "pandaharvester.harvesterworkermaker.simple_worker_maker"
    },
    "messenger": {
      "name": "BaseMessenger",
      "module": "pandaharvester.harvestermessenger.base_messenger",
      "accessPoint": "/harvester/workers"
    },
    "stager": {
      "name": "DummyStager",
      "module": "pandaharvester.harvesterstager.dummy_stager"
    },
    "monitor": {
      "name": "DockerMonitor",
      "module": "docker_monitor"
    },
    "sweeper": {
      "name": "DummySweeper",
      "module": "pandaharvester.harvestersweeper.dummy_sweeper"
    }
  },

  "PANDA_COMPOSE_LOCAL": {
    "queueStatus": "online",
    "prodSourceLabel": "test",
    "templateQueueName": "panda-compose-local.template",
    "maxWorkers": 10,
    "maxNewWorkersPerCycle": 5,
    "nQueueLimitWorkerRatio": 10,
    "nQueueLimitWorkerMin": 1,
    "nQueueLimitWorkerMax": 10,
    "nQueueLimitJobRatio": 10,
    "nQueueLimitJobMin": 1,
    "nQueueLimitJobMax": 50
  }
}
