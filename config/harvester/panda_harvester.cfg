{
  "db": {
    "engine": "mariadb",
    "useMySQLdb": true,
    "syncMaxWorkerID": true,
    "schema": "harvester_db",
    "host": "mariadb",
    "password": "harvester_secret",
    "verbose": false
  },
  "master": {
    "gname": "zp",
    "harvester_id": "panda-compose-harvester",
    "uname": "atlpan"
  },
  "communicator": {
    "nConnections": 5
  },
  "credmanager": {
    "moduleName": [],
    "pluginConfigs": []
  },
  "payload_interaction": {
    "jobSpecFile": "pandaJobData.out"
  },
  "pandacon": {
    "ca_cert": false,
    "auth_type": "token",
    "pandaURL": "http://panda-server:80/server/panda",
    "pandaURLSSL": "http://panda-server:80/server/panda",
    "cache_api_url_ssl": "http://panda-server:80/server/panda",
    "server_api_url_ssl": "http://panda-server:80/server/panda",
    "verbose": true
  },
  "apfmon": {
    "active": false
  },
  "frontend": {
    "type": "none"
  },
  "jobfetcher": {
    "lookupTime": 30,
    "sleepTime": 10
  },
  "propagator": {
    "maxJobs": 100,
    "maxWorkers": 100,
    "nWorkersInBulk": 20,
    "sleepTime": 5
  },
  "preparator": {
    "nThreads": 2,
    "maxJobsToCheck": 100,
    "maxJobsToTrigger": 100,
    "checkInterval": 15,
    "triggerInterval": 10,
    "sleepTime": 10
  },
  "submitter": {
    "nThreads": 2,
    "nQueues": 5,
    "lookupTime": 30,
    "maxNewWorkers": 100,
    "checkInterval": 30,
    "sleepTime": 10,
    "activateWorkerFactor": "auto"
  },
  "monitor": {
    "nThreads": 2,
    "checkInterval": 30,
    "lookupTime": 30,
    "sleepTime": 10
  },
  "stager": {
    "nThreads": 2,
    "maxJobsToCheck": 100,
    "maxJobsToTrigger": 100,
    "maxJobsToZip": 100,
    "checkInterval": 180,
    "triggerInterval": 180,
    "sleepTime": 60
  },
  "watcher": {
    "checkInterval": 30,
    "sleepTime": 30
  },
  "service_monitor": {
    "pidfile": "/var/run/panda/panda_harvester.pid"
  },
  "qconf": {
    "configFile": "/etc/harvester/panda_queues.cfg",
    "queueList": [
      "ALL"
    ]
  },
  "cacher": {
    "refreshInterval": 5,
    "data": []
  }
}
