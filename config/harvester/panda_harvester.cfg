[master]
uname = root
gname = root
loggername = harvester
harvester_id = panda-compose-harvester
debugger_port = 19550
dynamic_plugin_change = False
lock_interval = 60
server_side_queued_job_timeout = 720

[db]
verbose = False
useInspect = False
nConnections = 10
engine = mariadb
database_filename = /tmp/harvester.db
useMySQLdb = True
user = harvester
password = harvester_secret
schema = harvester_db
host = mariadb
port = 3306
reconnectTimeout = 300
syncMaxWorkerID = True

[fifo]
fifoModule = pandaharvester.harvesterfifo.sqlite_fifo
fifoClass = SqliteFifo
database_filename = /dev/shm/$(TITLE)_fifo.db

[communicator]
moduleName = pandaharvester.harvestercommunicator.panda_communicator
className = PandaCommunicator
nConnections = 5

[pandacon]
timeout = 180
auth_type = x509
ca_cert = False
cert_file = None
key_file = None
auth_token = None
auth_origin = None
pandaURL = http://panda-server:80/server/panda
server_api_url = http://panda-server:80/api/v1
pandaURLSSL = http://panda-server:80/server/panda
server_api_url_ssl = http://panda-server:80/api/v1
pandaCacheURL_W = http://panda-server:80/server/panda
cache_api_url_ssl = http://panda-server:80/api/v1
pandaCacheURL_R = http://panda-server:80/server/panda
verbose = True
useInspect = False
getEventsChunkSize = 5120

[qconf]
configFile = /etc/harvester/panda_queues.cfg
configFromCacher = False
queueList =
 ALL
autoBlacklist = False
updateInterval = 600
checkInterval = 5

[commandmanager]
commands_bulk_size = 20
sleepTime = 5

[jobfetcher]
nThreads = 2
nQueues = 5
maxJobs = 50
lookupTime = 60
sleepTime = 30

[propagator]
nThreads = 2
maxJobs = 100
nJobsInBulk = 100
maxWorkers = 100
nWorkersInBulk = 20
maxDialogs = 50
minMessageLevel = WARNING
lockInterval = 600
updateInterval = 1800
sleepTime = 10

[preparator]
nThreads = 2
maxJobsToCheck = 100
maxJobsToTrigger = 100
maxFilesPerJobToCheck = 0
maxFilesPerJobToPrepare = 0
lockInterval = 600
checkInterval = 15
triggerInterval = 10
sleepTime = 10

[submitter]
nThreads = 2
nQueues = 5
lookupTime = 30
queueLockInterval = 300
lockInterval = 600
checkInterval = 30
minSubmissionInterval = 0
sleepTime = 10
maxNewWorkers = 100
respectSleepTime = False

[monitor]
nThreads = 2
maxWorkers = 500
lockInterval = 600
checkInterval = 30
checkTimeout = 3600
sleepTime = 10
fifoEnable = False
fifoSleepTimeMilli = 15000
fifoCheckInterval = 120
fifoCheckDuration = 60
fifoForceEnqueueInterval = 1500
fifoMaxWorkersPerChunk = 500
fifoMaxPreemptInterval = 60
workerQueueTimeLimit = 172800
eventBasedEnable = False
postProcessTimeout = 0

[credmanager]
moduleName =
className =
inCertFile =
outCertFile =
voms =
sleepTime = 1800

[stager]
nThreads = 1
maxJobsToCheck = 100
maxJobsToTrigger = 100
maxJobsToZip = 100
maxFilesPerJobToCheck = 0
maxFilesPerJobToTrigger = 0
maxFilesPerJobToZip = 0
usePostZipping = False
lockInterval = 60
checkInterval = 30
triggerInterval = 30
zipInterval = 180
nThreadsForZip = 1
sleepTime = 15

[zipper]
maxJobsToZip = 100
maxFilesPerJobToZip = 0
usePostZipping = False
lockInterval = 600
zipInterval = 180
nThreadsForZip = 4

[eventfeeder]
nThreads = 2
maxWorkers = 500
lockInterval = 600
sleepTime = 60

[cacher]
data =
refreshInterval = 5
sleepTime = 60

[payload_interaction]
workerAttributesFile = worker_attributes.json
jobReportFile = jobReport.json
eventStatusDumpJsonFile = event_status.dump.json
eventStatusDumpXmlFile = _event_status.dump
jobRequestFile = worker_requestjob.json
jobSpecFile = pandaJobData.out
eventRequestFile = worker_requestevents.json
eventRangesFile = JobsEventRanges.json
updateEventsFile = worker_updateevents.json
xmlPoolCatalogFile = PoolFileCatalog_H.xml
pandaIDsFile = worker_pandaids.json
killWorkerFile = kill_worker.json
heartbeatFile = worker_heartbeat.json

[frontend]
type = none
portNumber = 25080
nThreads = 10
verbose = False
authEnable = False
verifyToken = False
secretFile = /dev/null

[sweeper]
nThreads = 2
maxWorkers = 500
checkInterval = 180
sleepTime = 60
keepFinished = 24
keepFailed = 72
keepCancelled = 72
keepMissed = 24

[watcher]
logFileNameList = panda-db_proxy.log
maxStalled = 300
nMessages = 1000
maxDuration = 600
checkInterval = 180
sleepTime = 60
actions =
passphraseEnv = HARVESTER_WATCHER_PASSPHRASE
mailServer = localhost
mailPort = 25
mailUseSSL = False
mailUser =
mailPassword =
mailFrom = harvester@localhost
mailTo = root@localhost

[apfmon]
active = False

[service_monitor]
active = False
pidfile = /var/run/panda/panda_harvester.pid
disk_volumes = data

[googlecloud]
zone = us-east1-b
project = harvester
service_account_file = /dev/null
user_data_file = /dev/null
image = dummy
harvester_frontend = localhost:25443

[file_syncer]
sleepTime = 600

[log_level]
